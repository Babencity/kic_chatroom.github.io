<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Radar Terminal</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />

<style>
body {
  margin: 0;
  background: #0b0e14;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

.chat-container {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: min(380px, calc(100vw - 20px));
  height: min(550px, calc(100vh - 40px));
  z-index: 10;
}

.chatroom {
  height: 100% !important;
  display: flex;
  flex-direction: column;
  background: rgba(10,20,30,0.7) !important;
  backdrop-filter: blur(15px);
  border-radius: 15px;
  border: 1px solid rgba(0,255,150,0.3);
}

.chatroom .messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.chatroom .msg {
  font-size: 14px !important;
  line-height: 1.5 !important;
  padding: 8px 10px;
  border-radius: 10px;
  color: #00ff96 !important;
  background: rgba(255,255,255,0.08);
}

.chatroom .footer {
  padding: 8px;
}

.chatroom #textInput {
  height: 40px !important;
  font-size: 14px;
}
</style>
</head>
<body>

<canvas id="radar"></canvas>
<div class="chat-container"></div>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

<script>
// ================= CONFIG =================
const CONFIG = {
  aircraftSpawnRate: 8000,
  aircraftSpeed: 1.2,
  pingDuration: 1000
};

// ================= CANVAS =================
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ================= AUDIO =================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, volume = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
  osc.stop(audioCtx.currentTime + 1);
}

// ================= STATE =================
let aircrafts = [];
let pings = [];

// ================= AIRCRAFT LOGIK =================
function spawnAircraft() {
  const edge = Math.floor(Math.random() * 4);
  let x, y;

  // Spawn an zufälligem Rand
  if (edge === 0) { // links
    x = -20;
    y = Math.random() * canvas.height;
  } else if (edge === 1) { // rechts
    x = canvas.width + 20;
    y = Math.random() * canvas.height;
  } else if (edge === 2) { // oben
    x = Math.random() * canvas.width;
    y = -20;
  } else { // unten
    x = Math.random() * canvas.width;
    y = canvas.height + 20;
  }

  // Ziel irgendwo im Bildschirm
  const targetX = Math.random() * canvas.width;
  const targetY = Math.random() * canvas.height;

  const dx = targetX - x;
  const dy = targetY - y;
  const length = Math.sqrt(dx * dx + dy * dy);

  aircrafts.push({
    x,
    y,
    vx: (dx / length) * CONFIG.aircraftSpeed,
    vy: (dy / length) * CONFIG.aircraftSpeed,
    angle: Math.atan2(dy, dx)
  });

  playSound(600, 0.05);
}

function drawAircraft(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.angle);

  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(-6, -4);
  ctx.lineTo(-3, 0);
  ctx.lineTo(-6, 4);
  ctx.closePath();

  ctx.fillStyle = "#00ff96";
  ctx.fill();

  ctx.restore();
}

// ================= EVENTS =================
document.addEventListener("mousedown", (e) => {
  if (e.target.closest(".chatroom")) return;
  pings.push({ x: e.clientX, y: e.clientY, start: Date.now() });
});

// ================= CHAT =================
const chatroom = new window.Chatroom({
  host: "https://curly-broccoli-97pg666gr9w4c76j9-5005.app.github.dev",
  title: "SkyNet Terminal",
  container: document.querySelector(".chat-container"),
  welcomeMessage: "System Ready."
});
chatroom.openChat();

// ================= LOOP =================
let lastSpawn = 0;

function draw(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = Math.min(canvas.width, canvas.height) / 2;

  // Radar-Kreis
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,255,150,0.2)";
  ctx.stroke();

  // Sweep
  const angle = time * 0.001;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, radius, angle, angle + 0.3);
  ctx.fillStyle = "rgba(0,255,150,0.1)";
  ctx.fill();

  // Flugzeuge bewegen
  aircrafts.forEach(a => {
    a.x += a.vx;
    a.y += a.vy;
    drawAircraft(a);
  });

  // Entfernen wenn außerhalb
  aircrafts = aircrafts.filter(a =>
    a.x > -50 && a.x < canvas.width + 50 &&
    a.y > -50 && a.y < canvas.height + 50
  );

  // Spawn
  if (time - lastSpawn > CONFIG.aircraftSpawnRate) {
    spawnAircraft();
    lastSpawn = time;
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>

</body>
</html>
