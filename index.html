<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Radar Terminal</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />

<style>
body {
  margin: 0;
  background: #0b0e14;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* ================= CHAT FIX ================= */
.chat-container {
  position: fixed;
  right: 20px;
  bottom: 20px;

  width: min(380px, calc(100vw - 20px));
  height: min(550px, calc(100vh - 40px));

  z-index: 10;
}

/* ================= DESIGN ================= */
.chatroom {
  height: 100% !important;
  display: flex;
  flex-direction: column;

  background: rgba(10,20,30,0.7) !important;
  backdrop-filter: blur(15px);
  border-radius: 15px;
  border: 1px solid rgba(0,255,150,0.3);
}

.chatroom .messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.chatroom .msg {
  font-size: 14px !important;
  line-height: 1.5 !important;
  padding: 8px 10px;
  border-radius: 10px;
  color: #00ff96 !important;
  background: rgba(255,255,255,0.08);
}

.chatroom .head {
  font-size: 16px;
  padding: 10px;
  color: #00ff96 !important;
  border-bottom: 1px solid rgba(0,255,150,0.3);
}

.chatroom .footer {
  padding: 8px;
  border-top: 1px solid rgba(0,255,150,0.2);
}

.chatroom #textInput {
  height: 40px !important;
  font-size: 14px;
  padding: 5px;
  background: rgba(0,0,0,0.4);
  color: white;
  border: 1px solid rgba(0,255,150,0.3);
}
</style>
</head>
<body>

<canvas id="radar"></canvas>
<div class="chat-container"></div>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

<script>
// ================= CONFIG =================
const CONFIG = {
  aircraftSpawnRate: 12000,
  aircraftSpeed: 0.7,
  pingDuration: 1000
};

// ================= CANVAS =================
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ================= AUDIO =================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, volume = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
  osc.stop(audioCtx.currentTime + 1);
}

// ================= STATE =================
let aircrafts = [];
let pings = [];

// ================= OBJECTS =================
function spawnAircraft() {
  aircrafts.push({
    x: -20,
    y: Math.random() * canvas.height,
    speed: Math.random() * 0.5 + CONFIG.aircraftSpeed,
    angle: 0
  });
  playSound(600, 0.05);
}

function createPing(x, y, danger = false) {
  pings.push({ x, y, start: Date.now(), danger });
  playSound(danger ? 150 : 880, 0.15);
}

// ================= EVENTS =================
document.addEventListener("mousedown", (e) => {
  if (e.target.closest(".chatroom")) return;
  createPing(e.clientX, e.clientY);
});

// ================= CHAT =================
const chatroom = new window.Chatroom({
  host: "https://curly-broccoli-97pg666gr9w4c76j9-5005.app.github.dev",
  title: "SkyNet Terminal",
  container: document.querySelector(".chat-container"),
  welcomeMessage: "System Ready.",
  onMessageReceived: function(message) {
    if (message.text?.toLowerCase().includes("alert")) {
      document.body.style.background = "#440000";
      createPing(canvas.width / 2, canvas.height / 2, true);
      setTimeout(() => document.body.style.background = "#0b0e14", 500);
    }
  }
});
chatroom.openChat();

// ================= DRAW =================
let lastSpawn = 0;

function drawAircraft(a) {
  ctx.save();
  ctx.translate(a.x, a.y);

  // Rotation je nach Richtung
  ctx.rotate(a.angle);

  ctx.beginPath();
  ctx.moveTo(10, 0);   // Spitze
  ctx.lineTo(-6, -4);
  ctx.lineTo(-3, 0);
  ctx.lineTo(-6, 4);
  ctx.closePath();

  ctx.fillStyle = "#00ff96";
  ctx.fill();

  ctx.restore();
}

function draw(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = Math.min(canvas.width, canvas.height) / 2;

  // Radar-Kreis
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,255,150,0.2)";
  ctx.stroke();

  // Sweep
  const angle = time * 0.001;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, radius, angle, angle + 0.3);
  ctx.fillStyle = "rgba(0,255,150,0.1)";
  ctx.fill();

  // Aircrafts
  aircrafts.forEach(a => {
    a.x += a.speed;
    a.angle = 0; // fliegt nach rechts

    drawAircraft(a);
  });

  aircrafts = aircrafts.filter(a => a.x < canvas.width);

  // Pings
  const now = Date.now();
  pings.forEach(p => {
    const progress = (now - p.start) / CONFIG.pingDuration;
    const size = progress * 50;

    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.strokeStyle = p.danger ? "#ff4b2b" : "#00ff96";
    ctx.globalAlpha = 1 - progress;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  pings = pings.filter(p => now - p.start < CONFIG.pingDuration);

  // Spawn
  if (time - lastSpawn > CONFIG.aircraftSpawnRate) {
    spawnAircraft();
    lastSpawn = time;
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>

</body>
</html>
