<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Makerspace Pro-Radar Terminal</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

  <style>
    body {
      margin: 0; padding: 0;
      background-color: #0b0e14;
      overflow: hidden;
      height: 100vh; width: 100vw;
      transition: background-color 0.4s;
    }

    /* GRID & RADAR */
    .grid {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(0, 255, 150, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 150, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }

    .radar {
      position: fixed;
      top: 50%; left: 50%;
      width: 150vh; height: 150vh;
      background: conic-gradient(from 0deg, rgba(0, 255, 150, 0.08) 0%, transparent 25%);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      animation: rotate 10s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* FLUGZEUGE */
    .aircraft {
      position: fixed;
      width: 5px; height: 5px;
      background: #00ff96;
      border-radius: 50%;
      box-shadow: 0 0 10px #00ff96;
      z-index: 2;
      animation: blink 0.8s infinite alternate;
    }
    @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }

    /* PINGS */
    .ping {
      position: fixed;
      width: 8px; height: 8px;
      background-color: #00ff96;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px #00ff96;
      animation: fadeOut 1.2s ease-out forwards;
      z-index: 5;
    }
    .ping.danger { background-color: #ff4b2b; box-shadow: 0 0 15px #ff4b2b; }
    @keyframes fadeOut { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(4); } }

    /* GLASSMORPHISM CHAT */
    .chatroom .msg {
      background: rgba(255, 255, 255, 0.07) !important;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #fff !important;
      border-radius: 12px !important;
    }
    .chatroom .head { background-color: #00ff96 !important; color: #0b0e14 !important; font-weight: bold; }
    .chat-container { position: relative; z-index: 10; height: 100vh; }
  </style>
</head>
<body>

  <div class="grid"></div>
  <div class="radar"></div>
  <div class="chat-container"></div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    // --- CHATBOT INITIALISIERUNG ---
    var chatroom = new window.Chatroom({
      host: "https://curly-broccoli-97pg666gr9w4c76j9-5005.app.github.dev",
      title: "🛰️ SkyNet Terminal",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "System Ready. Monitoring Airspace.",
      onMessageReceived: function(message) {
        if (message.text.toLowerCase().includes("alert")) {
          triggerEmergency();
        }
      }
    });
    chatroom.openChat();

    // --- VERBESSERTE SOUND ENGINE ---
    function playPingSound(freq = 880, volume = 0.1, type = 'sine') {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.0);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 1.0);
      } catch (e) {}
    }

    // --- ALARM MODUS ---
    function triggerEmergency() {
      document.body.style.backgroundColor = "#330000";
      playPingSound(150, 0.2, 'sawtooth');
      setTimeout(() => { document.body.style.backgroundColor = "#0b0e14"; }, 600);
    }

    // --- MANUELLER KLICK ---
    document.addEventListener('mousedown', function(event) {
      playPingSound(880, 0.15); // Hellerer, lauterer Klick-Ping
      const dot = document.createElement('div');
      dot.className = 'ping';
      dot.style.left = event.clientX + 'px';
      dot.style.top = event.clientY + 'px';
      document.body.appendChild(dot);
      setTimeout(() => { dot.remove(); }, 1200);
    });

    // --- AUTOMATISCHE FLUGZEUGE MIT PING ---
    function spawnAircraft() {
      // Sound abspielen, wenn das Flugzeug auf das Radar kommt
      playPingSound(660, 0.05); // Etwas tieferer und leiserer "Auto-Ping"

      const aircraft = document.createElement('div');
      aircraft.className = 'aircraft';
      aircraft.style.top = (Math.random() * (window.innerHeight - 100) + 50) + 'px';
      aircraft.style.left = '-10px';
      document.body.appendChild(aircraft);

      let pos = -10;
      const speed = Math.random() * 0.5 + 0.3; // Unterschiedliche Geschwindigkeiten
      const interval = setInterval(() => {
        pos += speed;
        aircraft.style.left = pos + 'px';
        if (pos > window.innerWidth) {
          clearInterval(interval);
          aircraft.remove();
        }
      }, 50);
    }

    // Starte Simulation: Alle 6-12 Sekunden ein Flugzeug
    setInterval(spawnAircraft, Math.random() * 6000 + 6000);
  </script>
</body>
</html>
