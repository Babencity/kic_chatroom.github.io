<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Optimized Radar Terminal</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />

<style>
body {
  margin: 0;
  background: #0b0e14;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

.chat-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 380px;
  height: 550px;
  z-index: 10;
}
</style>
</head>
<body>

<canvas id="radar"></canvas>
<div class="chat-container"></div>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

<script>
// ================= CONFIG =================
const CONFIG = {
  aircraftSpawnRate: 12000,
  aircraftSpeed: 0.5,
  pingDuration: 1000
};

// ================= CANVAS =================
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ================= AUDIO =================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, volume = 0.1, type = "sine") {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
  osc.stop(audioCtx.currentTime + 1);
}

// ================= STATE =================
let aircrafts = [];
let pings = [];

// ================= OBJECTS =================
function spawnAircraft() {
  aircrafts.push({
    x: -10,
    y: Math.random() * canvas.height,
    speed: Math.random() * 0.5 + CONFIG.aircraftSpeed
  });
  playSound(600, 0.05);
}

function createPing(x, y, danger = false) {
  pings.push({
    x, y,
    start: Date.now(),
    danger
  });
  playSound(danger ? 150 : 880, 0.15);
}

// ================= EVENTS =================
document.addEventListener("mousedown", (e) => {
  if (e.target.closest(".chatroom")) return;
  createPing(e.clientX, e.clientY);
});

// ================= CHAT =================
const chatroom = new window.Chatroom({
  host: "https://curly-broccoli-97pg666gr9w4c76j9-5005.app.github.dev",
  title: "SkyNet Terminal",
  container: document.querySelector(".chat-container"),
  welcomeMessage: "System Ready.",
  onMessageReceived: function(message) {
    if (message.text?.toLowerCase().includes("alert")) {
      document.body.style.background = "#440000";
      createPing(canvas.width / 2, canvas.height / 2, true);
      setTimeout(() => document.body.style.background = "#0b0e14", 500);
    }
  }
});
chatroom.openChat();

// ================= LOOP =================
let lastSpawn = 0;

function drawRadar(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Radar-Kreis
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = Math.min(canvas.width, canvas.height) / 2;

  const angle = time * 0.001;

  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,255,150,0.2)";
  ctx.stroke();

  // Sweep
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, radius, angle, angle + 0.3);
  ctx.fillStyle = "rgba(0,255,150,0.1)";
  ctx.fill();

  // Aircrafts
  aircrafts.forEach(a => {
    a.x += a.speed;

    ctx.beginPath();
    ctx.arc(a.x, a.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = "#00ff96";
    ctx.fill();
  });

  aircrafts = aircrafts.filter(a => a.x < canvas.width);

  // Pings
  const now = Date.now();
  pings.forEach(p => {
    const progress = (now - p.start) / CONFIG.pingDuration;
    const size = progress * 50;

    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.strokeStyle = p.danger ? "#ff4b2b" : "#00ff96";
    ctx.globalAlpha = 1 - progress;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  pings = pings.filter(p => now - p.start < CONFIG.pingDuration);

  // Spawn
  if (time - lastSpawn > CONFIG.aircraftSpawnRate) {
    spawnAircraft();
    lastSpawn = time;
  }

  requestAnimationFrame(drawRadar);
}

requestAnimationFrame(drawRadar);
</script>

</body>
</html>
