<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Makerspace Radar Terminal</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

  <style>
    /* 1. BASIS & HINTERGRUND */
    body { 
      margin: 0; padding: 0; background-color: #0b0e14; 
      overflow: hidden; height: 100vh; width: 100vw; 
      transition: background-color 0.4s;
    }

    .grid, .radar, .aircraft, .ping { pointer-events: none !important; }

    .grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 150, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 150, 0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; }
    
    .radar { 
      position: fixed; top: 50%; left: 50%; width: 150vh; height: 150vh; 
      background: conic-gradient(from 0deg, rgba(0, 255, 150, 0.08) 0%, transparent 25%); 
      transform: translate(-50%, -50%); border-radius: 50%; 
      animation: rotate 10s linear infinite; z-index: 1; 
    }
    @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

    .aircraft { position: fixed; width: 5px; height: 5px; background: #00ff96; border-radius: 50%; box-shadow: 0 0 10px #00ff96; z-index: 2; animation: blink 0.8s infinite alternate; }
    @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }

    .ping { position: fixed; width: 8px; height: 8px; background-color: #00ff96; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #00ff96; animation: fadeOut 1.2s ease-out forwards; z-index: 5; }
    .ping.danger { background-color: #ff4b2b; box-shadow: 0 0 15px #ff4b2b; }
    @keyframes fadeOut { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(4); } }

    /* 2. CHAT-CONTAINER */
    .chat-container { 
      position: fixed !important; 
      bottom: 20px !important; 
      right: 20px !important;
      width: 380px !important; 
      height: 550px !important;
      z-index: 9999 !important; 
      pointer-events: auto !important;
    }

    /* 3. GLAS-OPTIK */
    .chatroom {
      width: 100% !important;
      height: 100% !important;
      background: rgba(10, 20, 30, 0.6) !important;
      backdrop-filter: blur(20px) !important; 
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(0, 255, 150, 0.3) !important;
      border-radius: 15px !important;
      box-shadow: 0 10px 50px rgba(0,0,0,0.8) !important;
    }

    .chatroom .msg {
      background: rgba(255, 255, 255, 0.1) !important;
      backdrop-filter: blur(10px) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #00ff96 !important; 
      border-radius: 12px !important;
    }

    .chatroom .head {
      background: rgba(0, 255, 150, 0.15) !important;
      color: #00ff96 !important;
      border-bottom: 1px solid rgba(0, 255, 150, 0.3) !important;
    }

    .chatroom .footer { background: transparent !important; border-top: 1px solid rgba(0, 255, 150, 0.2) !important; }
    .chatroom #textInput { background: rgba(0,0,0,0.3) !important; color: white !important; border: 1px solid rgba(0, 255, 150, 0.2) !important; }
    
    /* Audio verstecken */
    #kenobi-sound { display: none; }
  </style>
</head>
<body>

  <div class="grid"></div>
  <div class="radar"></div>
  <div class="chat-container"></div>
  
  <audio id="kenobi-sound" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/hello_there.mp3" type="audio/mpeg">
  </audio>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>
  <script>
    // CHATBOT INITIALISIERUNG
    var chatroom = new window.Chatroom({
      host: "https://curly-broccoli-97pg666gr9w4c76j9-5005.app.github.dev",
      title: "🛰️ SkyNet Terminal",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "System Ready. Airspace secure.",
      onMessageReceived: function(message) {
        console.log("Nachricht vom Bot:", message);
        
        const text = (message.text || "").toLowerCase();
        
        // 1. Notfall Check
        if (text.includes("alert")) {
          triggerEmergency();
        }
        
        // 2. Kenobi Check
        const hasKenobiImage = message.image && message.image.includes("General_Kenobi");
        if (text.includes("kenobi") || hasKenobiImage) {
          triggerKenobiEffect();
        }
      }
    });
    chatroom.openChat();

    // SOUND ENGINE
    function playPingSound(freq = 880, volume = 0.1, type = 'sine') {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.0);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 1.0);
      } catch (e) {}
    }

    function triggerEmergency() {
      document.body.style.backgroundColor = "#440000";
      playPingSound(150, 0.2, 'sawtooth');
      setTimeout(() => { document.body.style.backgroundColor = "#0b0e14"; }, 700);
    }

    function triggerKenobiEffect() {
      // Blaues Leuchten
      document.body.style.backgroundColor = "#001a33";
      
      // Sound abspielen über das HTML Element
      const audio = document.getElementById('kenobi-sound');
      if (audio) {
        audio.currentTime = 0; // Zurück zum Anfang
        audio.volume = 0.7;
        audio.play().catch(err => {
          console.error("Audio konnte nicht abgespielt werden:", err);
        });
      }

      setTimeout(() => { 
        document.body.style.backgroundColor = "#0b0e14"; 
      }, 1000);
    }

    // RADAR PING BEIM KLICKEN
    document.addEventListener('mousedown', function(event) {
      if (event.target.closest('.chatroom')) return;
      playPingSound(880, 0.15);
      const dot = document.createElement('div');
      dot.className = 'ping';
      dot.style.left = event.clientX + 'px';
      dot.style.top = event.clientY + 'px';
      document.body.appendChild(dot);
      setTimeout(() => { dot.remove(); }, 1200);
    });

    // ZUFÄLLIGE FLUGZEUGE
    function spawnAircraft() {
      playPingSound(600, 0.04);
      const aircraft = document.createElement('div');
      aircraft.className = 'aircraft';
      aircraft.style.top = (Math.random() * (window.innerHeight - 150) + 50) + 'px';
      aircraft.style.left = '-10px';
      document.body.appendChild(aircraft);
      let pos = -10;
      const speed = Math.random() * 0.4 + 0.3;
      const interval = setInterval(() => {
        pos += speed;
        aircraft.style.left = pos + 'px';
        if (pos > window.innerWidth) { clearInterval(interval); aircraft.remove(); }
      }, 50);
    }
    setInterval(spawnAircraft, 12000);
  </script>
</body>
</html>
